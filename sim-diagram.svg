<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="'JetBrains Mono', ui-monospace, monospace" role="img" aria-label="Diagram of the Unity robotics simulator loop. A custom robot model is imported into the Unity physics environment. The simulated field and sensors feed the same control code the real robot runs. Driver and programmer practice happens in a shared multiplayer session, and what is learned feeds back into the control code before it is deployed to the real robot.">
  <defs>
    <pattern id="g2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#e6e3da" stroke-width="1" opacity="0.5"/>
    </pattern>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f6f62"/>
    </marker>
    <marker id="a2amber" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b3823a"/>
    </marker>
  </defs>

  <rect width="760" height="360" fill="#ffffff"/>
  <rect width="760" height="360" fill="url(#g2)"/>

  <!-- nodes -->
  <!-- 1 model import -->
  <g>
    <rect x="40" y="40" width="180" height="74" rx="10" fill="rgba(47,111,98,0.08)" stroke="#2f6f62" stroke-width="1.5"/>
    <text x="130" y="72" fill="#211f1c" font-size="14" font-weight="700" text-anchor="middle">Custom robot model</text>
    <text x="130" y="92" fill="#8b887f" font-size="11.5" text-anchor="middle">imported into the sim</text>
  </g>

  <!-- 2 unity physics -->
  <g>
    <rect x="290" y="30" width="190" height="94" rx="10" fill="rgba(179,130,58,0.10)" stroke="#b3823a" stroke-width="1.5"/>
    <text x="385" y="62" fill="#211f1c" font-size="14" font-weight="700" text-anchor="middle">Unity physics</text>
    <text x="385" y="82" fill="#8b887f" font-size="11.5" text-anchor="middle">field, collisions,</text>
    <text x="385" y="98" fill="#8b887f" font-size="11.5" text-anchor="middle">simulated sensors</text>
  </g>

  <!-- 3 control code -->
  <g>
    <rect x="550" y="40" width="180" height="74" rx="10" fill="rgba(47,111,98,0.08)" stroke="#2f6f62" stroke-width="1.5"/>
    <text x="640" y="72" fill="#211f1c" font-size="14" font-weight="700" text-anchor="middle">Control code</text>
    <text x="640" y="92" fill="#8b887f" font-size="11.5" text-anchor="middle">same as the real bot</text>
  </g>

  <!-- 4 multiplayer practice -->
  <g>
    <rect x="290" y="220" width="190" height="94" rx="10" fill="rgba(47,111,98,0.08)" stroke="#2f6f62" stroke-width="1.5"/>
    <text x="385" y="252" fill="#211f1c" font-size="14" font-weight="700" text-anchor="middle">Multiplayer session</text>
    <text x="385" y="272" fill="#8b887f" font-size="11.5" text-anchor="middle">drivers + programmers</text>
    <text x="385" y="288" fill="#8b887f" font-size="11.5" text-anchor="middle">practice together</text>
  </g>

  <!-- arrows -->
  <line x1="220" y1="77" x2="284" y2="77" stroke="#2f6f62" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="480" y1="77" x2="544" y2="77" stroke="#2f6f62" stroke-width="2" marker-end="url(#a2)"/>
  <!-- control -> sim (closing the loop, sensors in / commands out) -->
  <path d="M640 114 C 640 170, 470 150, 420 216" fill="none" stroke="#2f6f62" stroke-width="2" marker-end="url(#a2)"/>
  <text x="560" y="168" fill="#2f6f62" font-size="11.5">commands</text>
  <!-- sim -> practice -->
  <line x1="385" y1="124" x2="385" y2="216" stroke="#b3823a" stroke-width="2" marker-end="url(#a2amber)"/>
  <text x="398" y="162" fill="#b3823a" font-size="11.5">render</text>
  <!-- practice -> control (feedback) -->
  <path d="M350 216 C 300 150, 470 150, 555 105" fill="none" stroke="#b9b5a9" stroke-width="1.5" stroke-dasharray="5 6" marker-end="url(#a2)"/>
  <text x="150" y="205" fill="#8b887f" font-size="11.5">feedback: what we learn</text>

  <text x="40" y="340" fill="#211f1c" font-size="12.5">Iterate in software, then deploy to the real robot &#8212; faster than waiting for hardware.</text>
</svg>
